<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRTifact — Exhibit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }

    nav {
      background: #1a1a2e;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo { color: white; font-size: 20px; font-weight: 700; text-decoration: none; }
    .nav-logo span { color: #818cf8; }

    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-email { color: #a5b4fc; font-size: 14px; }

    .nav-link {
      color: white;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .nav-link:hover { background: rgba(255,255,255,0.1); }

    .nav-btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .nav-btn.outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); }
    .nav-btn.outline:hover { background: rgba(255,255,255,0.1); }

    .container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #4f46e5;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .back-link:hover { text-decoration: underline; }

    .exhibit-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .cover-image { width: 100%; height: 380px; object-fit: cover; display: block; }

    .cover-placeholder {
      width: 100%;
      height: 380px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    .exhibit-body { padding: 32px; }

    .lang-tabs { display: flex; gap: 8px; margin-bottom: 24px; }

    .lang-tab {
      padding: 6px 18px;
      border: 1.5px solid #e0e0e0;
      background: white;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }
    .lang-tab.active { background: #4f46e5; border-color: #4f46e5; color: white; }

    .exhibit-title { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; line-height: 1.3; }
    .exhibit-museum { font-size: 14px; color: #888; margin-bottom: 24px; }

    .audio-section {
      background: #f8f7ff;
      border: 1px solid #e0e7ff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .audio-label { font-size: 13px; font-weight: 600; color: #4f46e5; margin-bottom: 10px; }

    audio { width: 100%; outline: none; }

    .no-audio { color: #aaa; font-size: 13px; font-style: italic; }

    .description { font-size: 15px; color: #444; line-height: 1.8; white-space: pre-wrap; }

    .exhibit-stats {
      display: flex;
      gap: 20px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #f0f0f0;
      font-size: 13px;
      color: #aaa;
    }

    .loading { text-align: center; padding: 80px; color: #888; }
    .error-msg { text-align: center; padding: 80px; color: #dc2626; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">QR<span>Tifact</span></a>
    <div class="nav-right" id="navRight"></div>
  </nav>

  <div class="container">
    <a href="index.html" class="back-link">&#8592; Back to exhibits</a>
    <div id="content"><div class="loading">Loading exhibit...</div></div>
  </div>

  <script>
    const API = 'http://127.0.0.1:8000/api/v1';

    let currentExhibit = null;
    let currentLang = localStorage.getItem('lang') || 'uz';
    let listenTracked = false;

    function renderNav() {
      const email = localStorage.getItem('user_email');
      const navRight = document.getElementById('navRight');
      if (email) {
        navRight.innerHTML = `
          <span class="nav-email">${email}</span>
          <a href="profile.html" class="nav-link">Profile</a>
          <button class="nav-btn outline" onclick="logout()">Logout</button>
        `;
      } else {
        navRight.innerHTML = `<a href="auth.html" class="nav-btn">Login</a>`;
      }
    }

    function logout() {
      localStorage.removeItem('access_token');
      localStorage.removeItem('user_email');
      localStorage.removeItem('user_id');
      renderNav();
    }

    function getTranslation(exhibit, lang) {
      return exhibit.translations.find(t => t.language === lang)
        || exhibit.translations[0]
        || { title: 'Untitled', description: '' };
    }

    function getAudioTrack(exhibit, lang) {
      return exhibit.audio_tracks.find(t => t.language === lang) || null;
    }

    function getCoverImage(exhibit) {
      const cover = exhibit.media.find(m => m.is_cover) || exhibit.media[0];
      return cover?.public_url || null;
    }

    function renderExhibit(exhibit, lang) {
      const t = getTranslation(exhibit, lang);
      const audio = getAudioTrack(exhibit, lang);
      const img = getCoverImage(exhibit);

      document.title = `QRTifact — ${t.title}`;

      document.getElementById('content').innerHTML = `
        <div class="exhibit-card">
          ${img
            ? `<img class="cover-image" src="${img}" alt="${t.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
               <div class="cover-placeholder" style="display:none">🏛️</div>`
            : `<div class="cover-placeholder">🏛️</div>`
          }
          <div class="exhibit-body">
            <div class="lang-tabs">
              ${['uz','ru','en'].map(l => `
                <button class="lang-tab ${l === lang ? 'active' : ''}" onclick="switchLang('${l}')">
                  ${l.toUpperCase()}
                </button>
              `).join('')}
            </div>
            <h1 class="exhibit-title">${t.title}</h1>
            <div class="exhibit-museum">Museum Exhibit</div>
            <div class="audio-section">
              <div class="audio-label">🎧 Audio Guide</div>
              ${audio
                ? `<audio controls src="${audio.public_url}" onplay="trackListen()"></audio>`
                : `<div class="no-audio">No audio available for this language</div>`
              }
            </div>
            ${t.description ? `<div class="description">${t.description}</div>` : ''}
            <div class="exhibit-stats">
              <span>👁 ${exhibit.views_count} views</span>
              <span>🎵 ${exhibit.listens_count} listens</span>
            </div>
          </div>
        </div>
      `;
    }

    function switchLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      if (currentExhibit) renderExhibit(currentExhibit, lang);
    }

    async function trackListen() {
      if (!currentExhibit || listenTracked) return;
      listenTracked = true;
      try {
        await fetch(`${API}/exhibits/${currentExhibit.id}/listen`, { method: 'POST' });
      } catch {}
    }

    async function loadExhibit() {
      const slug = new URLSearchParams(window.location.search).get('slug');
      if (!slug) {
        document.getElementById('content').innerHTML = '<div class="error-msg">No exhibit specified.</div>';
        return;
      }

      try {
        const res = await fetch(`${API}/exhibits/${slug}`);
        if (!res.ok) throw new Error('Not found');
        currentExhibit = await res.json();

        try {
          await fetch(`${API}/exhibits/${currentExhibit.id}/view`, { method: 'POST' });
        } catch {}

        renderExhibit(currentExhibit, currentLang);
      } catch {
        document.getElementById('content').innerHTML = '<div class="error-msg">Exhibit not found.</div>';
      }
    }

    renderNav();
    loadExhibit();
  </script>
</body>
</html>
