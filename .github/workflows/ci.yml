name: CI

on:
  push:
    branches: [main, backend]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: qrtifact_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install uv

      - run: uv sync --frozen

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/qrtifact_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-32-characters-minimum
          DEBUG: "false"
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          ADMIN_SECRET_KEY: test-admin-secret-key
        run: uv run pytest --tb=short

  merge:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/backend'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge backend into main
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git checkout main
          git merge origin/backend --no-edit
          git push origin main
